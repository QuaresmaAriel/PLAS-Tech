<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Serviço - Gestor</title>

    <script>
        (function() {
            const darkMode = localStorage.getItem('darkMode') === 'true';
            const fontSize = localStorage.getItem('fontSize') || '16px';
            if (darkMode) {
                document.documentElement.classList.add('dark-mode');
            } else {
                document.documentElement.classList.remove('dark-mode');
            }
            document.documentElement.style.fontSize = fontSize;
        })();
    </script>

    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/forms.css">
</head>
<body>
    <div class="form-container">
        <header class="form-header">
            <a href="dashboard.html" class="btn-back">← Voltar</a>
            <h2>Cadastrar Serviço (OS)</h2>
        </header>

        <form id="form-servico">
            <div class="input-group">
                <label>Nome do Cliente</label>
                <input type="text" id="cliente-nome" placeholder="Ex: Bruce Wayne">
            </div>

            <div class="grid-2-col">
                <div class="input-group">
                    <label>Nº da OS</label>
                    <input type="text" id="os-numero" placeholder="001">
                </div>
                <div class="input-group">
                    <label>Aparelho</label>
                    <input type="text" id="aparelho" placeholder="Ex: Bat-Phone">
                </div>
            </div>

            <div class="input-group">
                <label>Problema Relatado</label>
                <textarea id="problema" rows="3" placeholder="Descreva o defeito..."></textarea>
            </div>

            

            <div class="input-group">
                <label>Orçamento (R$)</label>
                <input type="number" id="orcamento" placeholder="0,00">
            </div>

            <div class="input-group" style="margin-top: 20px; border-top: 1px solid #333; padding-top: 15px;">
    <label for="foto-input" style="cursor: pointer; display: flex; align-items: center; gap: 8px; color: #4CAF50; font-weight: bold; padding: 10px; border: 1px dashed #4CAF50; border-radius: 8px; justify-content: center;">
        <span>📸 Clique aqui para anexar foto</span>
    </label>
    <input type="file" id="foto-input" accept="image/*" capture="environment" style="display: none;">

    <div id="preview-container" style="display: none; margin-top: 10px; text-align: center; background: #222; padding: 10px; border-radius: 8px;">
        <p style="font-size: 12px; color: #aaa; margin-bottom: 5px;">Pré-visualização:</p>
        <img id="img-preview" src="" style="max-width: 100%; max-height: 250px; border-radius: 5px; border: 1px solid #555;">
        <br>
        <button type="button" id="btn-remover-foto" style="margin-top: 8px; background-color: #ff4444; color: white; border: none; padding: 5px 12px; border-radius: 4px; font-size: 12px; cursor: pointer;">
            🗑️ Remover foto
        </button>
    </div>
</div>


            <button type="submit" class="btn-save">Incluir na Fila</button>
        </form>
    </div>
    <script type="module" src="js/formularios.js">
    </script>
</body>
</html>
